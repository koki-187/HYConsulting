<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不動産査定セクション - HYコンサルティング</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f5f5f5;
        }

        /* セクション全体のスタイル */
        .valuation-section {
            background-color: #FFFFFF;
            padding: 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 見出しと説明文 */
        .section-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            color: #0D274D;
            margin-bottom: 16px;
        }

        .section-description {
            font-size: 16px;
            color: #666666;
        }

        /* 2列グリッドレイアウト */
        .valuation-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        /* 左カラム（テキストコンテンツ） */
        .valuation-info {
            background-color: #F5F5F5;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .info-icon {
            width: 48px;
            height: 48px;
            color: #008E7D;
            margin-bottom: 16px;
        }

        .info-title {
            font-size: 20px;
            font-weight: 700;
            color: #0D274D;
            margin-bottom: 12px;
        }

        .info-text {
            font-size: 14px;
            color: #666666;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .info-notice {
            font-size: 12px;
            color: #999999;
            background-color: #FFF9E6;
            padding: 10px;
            border-radius: 6px;
        }

        /* 右カラム（デモ用フォーム） */
        .valuation-form {
            background-color: #FFFFFF;
            padding: 30px;
            border: 1px solid #EAEAEA;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #0D274D;
            margin-bottom: 8px;
        }

        .form-select,
        .form-textarea {
            width: 100%;
            border: 1px solid #EAEAEA;
            border-radius: 8px;
            padding: 0 12px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-select {
            height: 44px;
            background-color: #FFFFFF;
            cursor: pointer;
        }

        .form-textarea {
            height: 80px;
            padding: 12px;
            resize: vertical;
        }

        .form-textarea::placeholder {
            color: #999999;
        }

        .form-button {
            width: 100%;
            height: 48px;
            background-color: #008E7D;
            color: #FFFFFF;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .form-button:hover {
            background-color: #006B5E;
        }

        .form-notice {
            font-size: 12px;
            color: #999999;
            text-align: center;
            margin-top: 12px;
        }

        /* レスポンシブ対応（タブレット） */
        @media (max-width: 900px) {
            .valuation-grid {
                gap: 30px;
            }
        }

        /* レスポンシブ対応（モバイル） */
        @media (max-width: 540px) {
            .valuation-section {
                padding: 40px 16px;
            }

            .section-title {
                font-size: 24px;
            }

            .section-description {
                font-size: 14px;
            }

            .valuation-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .valuation-info,
            .valuation-form {
                padding: 20px;
            }

            .info-title {
                font-size: 18px;
            }
        }

        /* アイコン用のSVG */
        .icon-calculator {
            display: inline-block;
        }
    </style>
</head>
<body>
    <!-- 不動産査定セクション -->
    <section class="valuation-section" id="valuation">
        <!-- 見出しと説明文 -->
        <div class="section-header">
            <h2 class="section-title">データベース査定（簡易）</h2>
            <p class="section-description">公的データベースや取引データに基づく算出を想定。AI推計ではありません。</p>
        </div>

        <!-- 2列グリッドレイアウト -->
        <div class="valuation-grid">
            <!-- 左カラム（テキストコンテンツ） -->
            <div class="valuation-info">
                <!-- アイコン -->
                <svg class="info-icon icon-calculator" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                </svg>

                <!-- 見出し -->
                <h3 class="info-title">入力は最小限でOK</h3>

                <!-- 説明文 -->
                <p class="info-text">住所は町名レベルでも構いません。まずは概算の目安を確認できます。</p>

                <!-- 注意書き -->
                <p class="info-notice">※ 実装時は、ここに「データベース査定ウィジェット（iframe）」を埋め込みます。</p>
            </div>

            <!-- 右カラム（デモ用フォーム） -->
            <div class="valuation-form">
                <!-- エリア -->
                <div class="form-group">
                    <label class="form-label" for="area">エリア</label>
                    <select class="form-select" id="area" name="area">
                        <option value="">選択してください</option>
                        <option value="yokohama">横浜</option>
                        <option value="shonan">湘南</option>
                        <option value="other">その他</option>
                    </select>
                </div>

                <!-- 物件種別 -->
                <div class="form-group">
                    <label class="form-label" for="property-type">物件種別</label>
                    <select class="form-select" id="property-type" name="property-type">
                        <option value="">選択してください</option>
                        <option value="house">戸建て</option>
                        <option value="mansion">マンション</option>
                        <option value="apartment">アパート（収益）</option>
                        <option value="land">土地</option>
                    </select>
                </div>

                <!-- 状況（任意） -->
                <div class="form-group">
                    <label class="form-label" for="situation">状況（任意）</label>
                    <textarea class="form-textarea" id="situation" name="situation" placeholder="例：相続、共有名義、分割協議中、空き家、売却相談など"></textarea>
                </div>

                <!-- CTAボタン -->
                <button class="form-button" type="button" onclick="alert('このボタンはデモです。STUDIO実装時はウィジェットに置き換えます。')">概算を確認（デモ）</button>

                <!-- 注意書き -->
                <p class="form-notice">このボタンはデモです。STUDIO実装時はウィジェットに置き換えます。</p>
            </div>
        </div>
    </section>

    <script>
        // デモ用のスクリプト（STUDIOでは不要）
        console.log('不動産査定セクション - HTMLプロトタイプ');
    </script>
</body>
</html>
